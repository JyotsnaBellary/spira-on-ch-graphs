<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OSM Graph Viewer</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    .controls {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      background: white; padding: 8px; border-radius: 6px; box-shadow: 0 2px 10px rgba(0,0,0,.1);
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>
      File:&nbsp;
      <input id="filePath" value="/data/example.txt" style="width:260px" />
    </label>
    <button id="loadBtn">Load</button>
  </div>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    // Parse your custom format into {nodes: Map, edges: [ [id1,id2], ... ]}
    async function loadGraph(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Failed to fetch ${url}: ${res.status}`);
      const text = await res.text();
      const lines = text
        .split(/\r?\n/)
        .map(l => l.trim())
        .filter(l => l.length > 0 && !l.startsWith('#'));

      let idx = 0;
      const n = parseInt(lines[idx++], 10);
      const m = parseInt(lines[idx++], 10);

      const nodes = new Map(); // id -> {lat, lon}
      for (let i = 0; i < n; i++) {
        const [idStr, latStr, lonStr] = lines[idx++].split(/\s+/);
        const id = parseInt(idStr, 10);
        nodes.set(id, { lat: parseFloat(latStr), lon: parseFloat(lonStr) });
      }

      const edges = [];
      for (let i = 0; i < m; i++) {
        const [sStr, tStr] = lines[idx++].split(/\s+/);
        edges.push([parseInt(sStr, 10), parseInt(tStr, 10)]);
      }

      return { nodes, edges };
    }

    // Build Leaflet layers (points + lines)
    function buildLayers(graph) {
      const { nodes, edges } = graph;

      // Markers for nodes
      const markers = [];
      nodes.forEach((v, id) => {
        markers.push(L.circleMarker([v.lat, v.lon], { radius: 3 }).bindTooltip(`id: ${id}`));
      });
      const nodeLayer = L.layerGroup(markers);

      // Polylines for edges
      const segs = [];
      for (const [a, b] of edges) {
        const na = nodes.get(a);
        const nb = nodes.get(b);
        if (!na || !nb) continue;
        segs.push([[na.lat, na.lon], [nb.lat, nb.lon]]);
      }
      const edgeLayer = L.polyline(segs, { weight: 1 });

      return { nodeLayer, edgeLayer };
    }

    // Init map
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    async function loadAndDraw(url) {
      const graph = await loadGraph(url);
      const { nodeLayer, edgeLayer } = buildLayers(graph);
      nodeLayer.addTo(map);
      edgeLayer.addTo(map);

      // Fit bounds to all nodes
      const latlngs = [];
      graph.nodes.forEach(({lat, lon}) => latlngs.push([lat, lon]));
      if (latlngs.length) {
        map.fitBounds(L.latLngBounds(latlngs), { padding: [20, 20] });
      }

      // Layer control
      L.control.layers(null, { 'Nodes': nodeLayer, 'Edges': edgeLayer }, { collapsed: false }).addTo(map);
    }

    // UI
    document.getElementById('loadBtn').addEventListener('click', () => {
      const url = document.getElementById('filePath').value.trim();
      loadAndDraw(url).catch(err => alert(err.message));
    });

    // Auto-load default if it exists
    loadAndDraw(document.getElementById('filePath').value).catch(()=>{});
  </script>
</body>
</html>
